<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chaos Slotmachine Deluxe — Full</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
  :root{
    --bg:#071018;--panel:#0b1220;--muted:#9aa4b2;--accent:#ffd700;
    --glass: rgba(255,255,255,0.03);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#02030a,#071018);color:#e6eef6}
  .wrap{max-width:1200px;margin:20px auto;padding:18px;display:grid;grid-template-columns:1fr 360px;gap:18px}
  header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center}
  h1{margin:0;color:var(--accent);font-size:20px}
  .muted{color:var(--muted)}
  .panel{background:linear-gradient(180deg,#071018,#0b0f12);padding:14px;border-radius:12px;border:1px solid var(--glass)}
  .btn{padding:8px 12px;border-radius:8px;border:none;background:#2b6cff;color:#fff;cursor:pointer;font-weight:700}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
  .balance{position:fixed;right:18px;top:18px;background:linear-gradient(90deg,#0b1220,#071018);padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 8px 30px rgba(0,0,0,0.6);z-index:999}
  .balance strong{color:var(--accent);font-size:18px}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .slot-card{padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);background:linear-gradient(180deg,#0b1220,#071018)}
  .slot-card h3{margin:8px 0 6px;color:#ffdca3}
  .game{display:grid;grid-template-columns:1fr 320px;gap:12px}
  .machine{background:linear-gradient(180deg,#08121a,#061018);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
  .reels{display:flex;gap:12px;justify-content:center;align-items:center;padding:12px}
  .reel{width:96px;height:288px;background:#07121a;border-radius:10px;border:1px solid rgba(255,255,255,0.03);overflow:hidden;position:relative;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
  .strip{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;align-items:center;transition:transform 1s cubic-bezier(.2,.9,.2,1)}
  .symbol{width:84px;height:84px;margin:6px 0;border-radius:8px;background:linear-gradient(180deg,#0f1720,#0b1220);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;border:1px solid rgba(255,255,255,0.03);box-shadow:0 6px 18px rgba(0,0,0,0.6);user-select:none}
  .symbol img{width:100%;height:100%;object-fit:cover;border-radius:8px;display:block}
  .symbol.wild{box-shadow:0 0 18px rgba(255,215,0,0.18) inset}
  .symbol.bonus{box-shadow:0 0 18px rgba(255,107,107,0.12) inset}
  .controls{padding:12px;border-radius:10px}
  .select{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff}
  .paylines{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .line-pill{padding:6px 8px;border-radius:8px;background:rgba(255,255,255,0.02);font-size:13px}
  .log{height:120px;overflow:auto;background:rgba(255,255,255,0.02);padding:8px;border-radius:8px;margin-top:8px;font-size:13px}
  .highlight{outline:3px solid rgba(255,215,0,0.12);box-shadow:0 8px 30px rgba(255,215,0,0.06) inset}
  #particles{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:9998}
  .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:9999}
  .modal .panel{width:760px;max-width:95%}
  .field{display:flex;flex-direction:column;margin-bottom:10px}
  .small{font-size:13px;color:var(--muted)}
  @media (max-width:980px){.wrap{grid-template-columns:1fr}.balance{position:static;margin:12px auto;display:flex;justify-content:center}}
</style>
</head>
<body>
  <div id="app"></div>

  <div id="balanceWidget" class="balance" style="display:none">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:44px;height:44;border-radius:8px;background:linear-gradient(90deg,#ffd700,#ffb86b);display:flex;align-items:center;justify-content:center;color:#04120a;font-weight:800">₾</div>
      <div>
        <div class="small muted">Balance</div>
        <div><strong id="balanceAmount">0.00 ₾</strong></div>
      </div>
    </div>
  </div>

  <div style="position:fixed;left:18px;top:18px;z-index:9999">
    <button id="uploadSymbolsBtn" class="btn btn-ghost">Upload Symbols</button>
  </div>

  <div id="uploadModal" style="display:none" class="modal">
    <div class="panel">
      <h3 style="margin:0 0 8px;color:var(--accent)">Upload slot images (auto crop)</h3>
      <div class="small muted" style="margin-bottom:8px">Files will be center‑cropped and resized to 512×512 for consistent visuals.</div>
      <div id="uploadList" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:420px;overflow:auto"></div>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button id="saveUploads" class="btn">Save</button>
        <button id="closeUploads" class="btn btn-ghost">Close</button>
      </div>
    </div>
  </div>

  <canvas id="particles"></canvas>

<script>
/* =========================
   Full enhanced slot — single file
   - Auto-crop upload (center crop to 512x512)
   - Local repo image mapping support
   - High-quality audio preload (assets/audio/*)
   - Polished reel animation, particles, gamble, jackpot
   ========================= */

/* Storage keys */
const STORAGE = {
  USERS: 'cs_users_v4',
  CURRENT: 'cs_current_v4',
  BAL: 'cs_bal_v4',
  JACK: 'cs_jack_v4',
  SYMBOLS: 'cs_symbols_v4' // dataURLs from upload or repo mapping
};
const DEFAULT_BAL = 200;
if (!localStorage.getItem(STORAGE.JACK)) localStorage.setItem(STORAGE.JACK, '2500');

/* Symbol keys */
const SYMBOL_KEYS = ['7','BAR','A','K','Q','J','CH','WILD','BONUS'];

/* Local repo mapping — edit paths if you name files differently */
const SYMBOL_IMAGE_FILES = {
  '7': 'assets/images/7.png',
  'BAR': 'assets/images/BAR.png',
  'A': 'assets/images/A.png',
  'K': 'assets/images/K.png',
  'Q': 'assets/images/Q.png',
  'J': 'assets/images/J.png',
  'CH': 'assets/images/CH.png',
  'WILD': 'assets/images/WILD.png',   // put your cucumber image here and name it WILD.png (or change path)
  'BONUS': 'assets/images/BONUS.png'
};

/* Audio files mapping — put high-quality short effects in assets/audio/ */
const AUDIO_FILES = {
  spin: 'assets/audio/spin.mp3',
  reel_stop: 'assets/audio/reel_stop.mp3',
  win: 'assets/audio/win.mp3',
  big_win: 'assets/audio/big_win.mp3',
  mega_win: 'assets/audio/mega_win.mp3',
  lose: 'assets/audio/lose.mp3'
};

/* Utilities */
function save(key,obj){ localStorage.setItem(key, JSON.stringify(obj)); }
function load(key,def){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }
function getUsers(){ return load(STORAGE.USERS, {}); }
function saveUsers(u){ save(STORAGE.USERS, u); }
function getCurrent(){ return localStorage.getItem(STORAGE.CURRENT); }
function setCurrent(u){ if(u) localStorage.setItem(STORAGE.CURRENT, u); else localStorage.removeItem(STORAGE.CURRENT); render(); renderBalance(); }
function getBalances(){ return load(STORAGE.BAL, {}); }
function setBalance(user,amt){ const b = getBalances(); b[user] = Number(amt); save(STORAGE.BAL, b); renderBalance(); }
function getBalance(user){ const b = getBalances(); if (b[user] == null){ b[user] = DEFAULT_BAL; save(STORAGE.BAL, b); } return Number(b[user]); }
function getJack(){ return Number(localStorage.getItem(STORAGE.JACK) || 0); }
function setJack(v){ localStorage.setItem(STORAGE.JACK, String(Math.max(0, Math.round(v)))); renderJack(); }

/* Audio: preload buffers */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const AUDIO_BUFFERS = {};
async function preloadAudio(){
  for(const name of Object.keys(AUDIO_FILES)){
    const path = AUDIO_FILES[name];
    try{
      const resp = await fetch(path);
      if(!resp.ok) throw new Error('no file');
      const ab = await resp.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(ab);
      AUDIO_BUFFERS[name] = buf;
    }catch(e){
      AUDIO_BUFFERS[name] = null; // fallback to synth
    }
  }
}
/* play audio helper */
function playAudio(name, {gain=1} = {}){
  const buf = AUDIO_BUFFERS[name];
  if(buf){
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    g.gain.value = gain;
    src.buffer = buf;
    src.connect(g); g.connect(audioCtx.destination);
    src.start();
    return;
  }
  // fallback synth
  if(name === 'spin') synthTone(420,0.06,'sawtooth',0.06);
  else if(name === 'reel_stop') synthTone(880,0.06,'sine',0.06);
  else if(name === 'win') synthTone(1200,0.18,'triangle',0.08);
  else if(name === 'big_win') synthTone(1600,0.22,'sine',0.12);
  else if(name === 'mega_win') synthTone(2200,0.28,'sine',0.14);
  else if(name === 'lose') synthTone(160,0.12,'sawtooth',0.08);
}
function synthTone(freq, time=0.08, type='sine', vol=0.06){
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + time);
}

/* Particles */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
function spawnParticles(x,y,color='#ffd700',count=40){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-1.5)*8,
      life:60 + Math.random()*60,
      color,
      size:4 + Math.random()*6
    });
  }
}
function updateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
    ctx.globalAlpha = Math.max(0, p.life/100);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    if(p.life<=0) particles.splice(i,1);
  }
  requestAnimationFrame(updateParticles);
}
requestAnimationFrame(updateParticles);

/* Image preload from repo (if present) */
const IMAGE_CACHE = {};
async function preloadRepoImages(){
  for(const key of SYMBOL_KEYS){
    const path = SYMBOL_IMAGE_FILES[key];
    try{
      const img = new Image();
      img.src = path;
      await new Promise((res,rej)=>{ img.onload = res; img.onerror = rej; });
      IMAGE_CACHE[key] = path; // store path (not dataURL) to use directly
    }catch(e){
      IMAGE_CACHE[key] = null;
    }
  }
}

/* Load saved symbol images (dataURLs) */
function loadSymbolImages(){ return load(STORAGE.SYMBOLS, {}); }
function saveSymbolImages(obj){ save(STORAGE.SYMBOLS, obj); }

/* Apply images to any .symbol elements (repo images take precedence) */
function applySymbolImagesToEngine(){
  const saved = loadSymbolImages();
  const merged = {};
  for(const k of SYMBOL_KEYS){
    if(IMAGE_CACHE[k]) merged[k] = IMAGE_CACHE[k];
    else if(saved[k]) merged[k] = saved[k];
    else merged[k] = null;
  }
  window.SYMBOL_IMAGES = merged;
  const els = document.querySelectorAll('.symbol');
  els.forEach(el=>{
    const sym = el.dataset.sym;
    if(!sym) return;
    const src = window.SYMBOL_IMAGES[sym];
    if(src){
      el.innerHTML = '';
      const img = document.createElement('img'); img.src = src; el.appendChild(img);
      if(sym === 'WILD') el.classList.add('wild'); else el.classList.remove('wild');
    } else {
      el.innerHTML = sym;
      el.classList.remove('wild');
    }
  });
}

/* Auto-crop & resize helper: center-crop to square and resize to 512x512 */
function cropAndResizeImageFile(file, size=512){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const minSide = Math.min(img.width, img.height);
        const sx = Math.floor((img.width - minSide) / 2);
        const sy = Math.floor((img.height - minSide) / 2);
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        // high quality
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
        const dataUrl = canvas.toDataURL('image/png', 0.92);
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* Upload modal logic with auto-crop */
function openUploadModal(){
  const modal = document.getElementById('uploadModal');
  const list = document.getElementById('uploadList');
  list.innerHTML = '';
  const saved = loadSymbolImages();
  SYMBOL_KEYS.forEach(key=>{
    const wrapper = document.createElement('div');
    wrapper.style.display='flex'; wrapper.style.gap='8px'; wrapper.style.alignItems='center';
    const preview = document.createElement('div');
    preview.style.width='64px'; preview.style.height='64px'; preview.style.borderRadius='8px'; preview.style.overflow='hidden';
    preview.style.background='rgba(255,255,255,0.02)'; preview.style.display='flex'; preview.style.alignItems='center'; preview.style.justifyContent='center';
    preview.style.fontSize='14px'; preview.style.color='#fff'; preview.textContent = key;
    // show repo image if exists
    if(IMAGE_CACHE[key]){ const img = document.createElement('img'); img.src = IMAGE_CACHE[key]; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover'; preview.textContent=''; preview.appendChild(img); }
    else if(saved[key]){ const img = document.createElement('img'); img.src = saved[key]; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover'; preview.textContent=''; preview.appendChild(img); }
    const info = document.createElement('div'); info.style.flex='1'; info.innerHTML = `<div style="font-weight:700">${key}</div><div class="muted small">Upload image (will be center-cropped)</div>`;
    const fileInput = document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*'; fileInput.style.width='160px';
    fileInput.onchange = async (e) => {
      const f = e.target.files[0]; if(!f) return;
      try{
        const dataUrl = await cropAndResizeImageFile(f, 512);
        preview.innerHTML = '';
        const img = document.createElement('img'); img.src = dataUrl; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover';
        preview.appendChild(img);
        fileInput._dataUrl = dataUrl;
        fileInput._remove = false;
      }catch(err){
        alert('Image processing failed.');
      }
    };
    const removeBtn = document.createElement('button'); removeBtn.textContent='Remove'; removeBtn.className='btn btn-ghost';
    removeBtn.onclick = ()=> { preview.innerHTML = key; fileInput.value=''; fileInput._dataUrl = null; fileInput._remove = true; };
    wrapper.appendChild(preview); wrapper.appendChild(info); wrapper.appendChild(fileInput); wrapper.appendChild(removeBtn);
    list.appendChild(wrapper);
  });
  modal.style.display = 'flex';
}
function saveUploadsFromModal(){
  const modal = document.getElementById('uploadModal');
  const inputs = modal.querySelectorAll('input[type=file]');
  const saved = loadSymbolImages();
  let idx = 0;
  inputs.forEach(inp=>{
    const key = SYMBOL_KEYS[idx++];
    if(inp._remove){ delete saved[key]; return; }
    if(inp._dataUrl) saved[key] = inp._dataUrl;
  });
  saveSymbolImages(saved);
  applySymbolImagesToEngine();
  modal.style.display = 'none';
}

/* Hook upload buttons */
document.addEventListener('click', (e)=>{
  if(e.target && e.target.id === 'uploadSymbolsBtn') openUploadModal();
  if(e.target && e.target.id === 'closeUploads') document.getElementById('uploadModal').style.display='none';
  if(e.target && e.target.id === 'saveUploads') saveUploadsFromModal();
});

/* SPA rendering */
const app = document.getElementById('app');
function navigate(route){ location.hash = route; }
window.addEventListener('hashchange', render);

function render(){
  const route = location.hash.replace('#','') || 'login';
  if(route.startsWith('play/')) renderGame(route.split('/')[1]);
  else if(route === 'dashboard') renderDashboard();
  else renderAuth();
  renderBalance();
  renderJack();
}

/* AUTH UI */
function renderAuth(){
  app.innerHTML = `
    <div class="panel" style="max-width:560px;margin:40px auto">
      <h2 style="margin:0 0 8px">Chaos Slot Deluxe</h2>
      <div class="muted">Register or login. Balance and uploads are stored locally in your browser.</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btnLogin" class="btn">Login</button>
        <button id="btnReg" class="btn btn-ghost">Register</button>
      </div>
      <div id="authArea" style="margin-top:12px"></div>
    </div>
  `;
  $('#btnLogin').onclick = showLogin;
  $('#btnReg').onclick = showRegister;
  const cur = getCurrent();
  if(cur){
    $('#authArea').innerHTML = `<div class="muted">Logged in as <strong>${cur}</strong>. <button id="toDash" class="btn" style="margin-left:8px">Dashboard</button></div>`;
    $('#toDash').onclick = ()=> navigate('dashboard');
  }
}
function showLogin(){
  $('#authArea').innerHTML = `
    <div>
      <div class="field"><label class="muted">Username</label><input id="liUser" /></div>
      <div class="field"><label class="muted">Password</label><input id="liPass" type="password" /></div>
      <div style="display:flex;gap:8px"><button id="doLogin" class="btn">Login</button><button id="cancel" class="btn btn-ghost">Cancel</button></div>
      <div id="msg" class="muted small" style="margin-top:8px"></div>
    </div>
  `;
  $('#cancel').onclick = ()=> $('#authArea').innerHTML='';
  $('#doLogin').onclick = ()=>{
    const u = $('#liUser').value.trim(), p = $('#liPass').value;
    const users = getUsers();
    if(users[u] && users[u].password === p){ localStorage.setItem(STORAGE.CURRENT, u); render(); playAudio('spin'); }
    else { $('#msg').textContent = 'Invalid credentials'; synthTone(160,0.12,'sawtooth',0.08); }
  };
}
function showRegister(){
  $('#authArea').innerHTML = `
    <div>
      <div class="field"><label class="muted">Name</label><input id="rName" /></div>
      <div class="field"><label class="muted">Username</label><input id="rUser" /></div>
      <div class="field"><label class="muted">Password</label><input id="rPass" type="password" /></div>
      <div style="display:flex;gap:8px"><button id="doReg" class="btn">Register</button><button id="cancel2" class="btn btn-ghost">Cancel</button></div>
      <div id="rmsg" class="muted small" style="margin-top:8px"></div>
    </div>
  `;
  $('#cancel2').onclick = ()=> $('#authArea').innerHTML='';
  $('#doReg').onclick = ()=>{
    const name = $('#rName').value.trim(), u = $('#rUser').value.trim(), p = $('#rPass').value;
    if(!name||!u||!p){ $('#rmsg').textContent='Fill all fields'; return; }
    const users = getUsers();
    if(users[u]){ $('#rmsg').textContent='Username taken'; return; }
    users[u] = { name, username:u, password:p, email:'' };
    saveUsers(users);
    const balances = getBalances(); balances[u] = DEFAULT_BAL; save(STORAGE.BAL, balances);
    localStorage.setItem(STORAGE.CURRENT, u);
    synthTone(880,0.08); render();
  };
}

/* Dashboard */
function renderDashboard(){
  const cur = getCurrent(); if(!cur){ navigate(''); return; }
  app.innerHTML = `
    <div class="wrap">
      <header><div><h1>Dashboard</h1><div class="muted">Choose a slot and play — enhanced visuals</div></div><div class="muted">User: <strong>${cur}</strong></div></header>
      <section class="panel">
        <h3 style="margin:0 0 8px">Slots</h3>
        <div class="slots" id="slotsList"></div>
      </section>
      <aside class="panel">
        <div class="muted">Jackpot</div>
        <div style="font-weight:800;color:#ffd700;margin-top:6px" id="jackVal">${formatMoney(getJack())}</div>
        <div style="margin-top:12px" class="muted">Balance</div>
        <div style="font-weight:800;margin-top:6px" id="dashBal">${formatMoney(getBalance(cur))}</div>
        <div style="margin-top:12px"><button id="add50" class="btn btn-ghost">+50₾</button><button id="logout" class="btn btn-ghost" style="margin-left:8px">Logout</button></div>
        <div style="margin-top:12px" class="muted">Uploads</div>
        <div style="margin-top:8px"><button id="openUploads" class="btn btn-ghost">Open Uploads</button></div>
      </aside>
    </div>
  `;
  const slots = [
    {id:'burning', title:'Burning Hot Deluxe', desc:'Classic hot symbols, wilds and gamble'},
    {id:'egt', title:'EGT Style Deluxe', desc:'Paylines, bonus, free spins'},
    {id:'mega', title:'Mega Lines', desc:'High variance, many lines'}
  ];
  const list = $('#slotsList');
  slots.forEach(s=>{
    const card = document.createElement('div'); card.className='slot-card';
    card.innerHTML = `<h3>${s.title}</h3><div class="muted">${s.desc}</div><div style="margin-top:8px"><button class="btn" data-id="${s.id}">Play</button></div>`;
    list.appendChild(card);
  });
  $all('.slot-card .btn').forEach(b=> b.onclick = e=> navigate('play/'+e.currentTarget.dataset.id));
  $('#add50').onclick = ()=> { const u=getCurrent(); setBalance(u, getBalance(u)+50); playAudio('win'); $('#dashBal').textContent = formatMoney(getBalance(u)); };
  $('#logout').onclick = ()=> { setCurrent(null); synthTone(220,0.06); };
  $('#openUploads').onclick = ()=> openUploadModal();
}

/* Format */
function formatMoney(n){ return Number(n).toFixed(2) + ' ₾'; }
function renderBalance(){ const cur = getCurrent(); const w = document.getElementById('balanceWidget'); if(!cur){ w.style.display='none'; return; } w.style.display='block'; $('#balanceAmount').textContent = formatMoney(getBalance(cur)); }
function renderJack(){ const el = document.getElementById('jackVal'); if(el) el.textContent = formatMoney(getJack()); }

/* Slot engine (polished) */
function renderGame(slotId){
  const cur = getCurrent(); if(!cur){ navigate(''); return; }
  app.innerHTML = `
    <div class="wrap">
      <header><div><h1>Playing: ${slotId}</h1><div class="muted">Animated reels, wilds, bonus and gamble</div></div><div class="muted">User: <strong>${cur}</strong></div></header>
      <section class="panel game">
        <div class="machine">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div class="muted">Reels: 5 x 3</div>
            <div class="muted">Lines: <span id="linesCount">10</span></div>
          </div>
          <div class="reels" id="reelsArea"></div>
          <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
            <button id="spinBtn" class="btn">SPIN</button>
            <button id="autoBtn" class="btn btn-ghost">Auto x10</button>
            <div style="margin-left:auto">
              <select id="betSel" class="select"></select>
            </div>
          </div>
          <div class="log" id="gameLog"></div>
        </div>
        <aside class="panel controls">
          <div class="muted">Balance</div>
          <div style="font-weight:800;margin-top:6px" id="gBalance">${formatMoney(getBalance(cur))}</div>
          <div style="margin-top:12px" class="muted">Lines (5–20)</div>
          <input id="linesRange" type="range" min="5" max="20" value="10" style="width:100%;margin-top:6px" />
          <div class="paylines" id="paylines"></div>
          <div style="margin-top:12px" class="muted">Last Win</div>
          <div id="lastWin" style="font-weight:800">0.00 ₾</div>
          <div style="margin-top:12px" class="muted">Gamble</div>
          <div style="display:flex;gap:8px;margin-top:6px">
            <button id="redBtn" class="btn btn-ghost">Red</button>
            <button id="blackBtn" class="btn btn-ghost">Black</button>
          </div>
          <div style="margin-top:12px" class="muted">Jackpot</div>
          <div id="jackPanel" style="font-weight:800;color:#ffd700">${formatMoney(getJack())}</div>
        </aside>
      </section>
    </div>
  `;
  // build reels
  const reelsArea = $('#reelsArea');
  const REELS = 5, ROWS = 3;
  const SYMBOL_POOL = buildSymbolPool();
  for(let i=0;i<REELS;i++){
    const r = document.createElement('div'); r.className='reel'; r.dataset.idx = i;
    const strip = document.createElement('div'); strip.className='strip';
    for(let k=0;k<40;k++){
      const s = SYMBOL_POOL[Math.floor(Math.random()*SYMBOL_POOL.length)];
      const sym = document.createElement('div'); sym.className='symbol';
      sym.dataset.sym = s.id;
      if(s.special==='wild') sym.classList.add('wild');
      if(s.special==='bonus') sym.classList.add('bonus');
      sym.textContent = s.label;
      strip.appendChild(sym);
    }
    r.appendChild(strip); reelsArea.appendChild(r);
  }
  applySymbolImagesToEngine();

  // controls
  const betSel = $('#betSel');
  [0.5,1,2,5,10,20].forEach(b=>{ const o=document.createElement('option'); o.value=b; o.textContent=b+' ₾'; betSel.appendChild(o); });
  const linesRange = $('#linesRange'); const linesCount = $('#linesCount'); linesRange.oninput = ()=> { linesCount.textContent = linesRange.value; renderPaylines(linesRange.value); updateTotal(); };
  renderPaylines(linesRange.value);
  function renderPaylines(n){ const wrap = $('#paylines'); wrap.innerHTML=''; for(let i=1;i<=n;i++){ const p=document.createElement('div'); p.className='line-pill'; p.textContent='Line '+i; wrap.appendChild(p); } }
  function updateTotal(){ $('#lastWin').textContent = formatMoney(0); $('#gBalance').textContent = formatMoney(getBalance(cur)); }

  // spin logic
  let spinning=false, lastWin=0, autoCount=0;
  function spin(){
    if(spinning) return;
    const bet = Number(betSel.value), lines = Number(linesRange.value), totalBet = bet*lines;
    if(getBalance(cur) < totalBet){ log('Insufficient balance'); playAudio('lose'); return; }
    setBalance(cur, getBalance(cur)-totalBet);
    $('#gBalance').textContent = formatMoney(getBalance(cur));
    playAudio('spin');
    spinning=true; lastWin=0;
    const reelEls = $all('.reel');
    reelEls.forEach((r, idx)=>{
      const strip = r.querySelector('.strip');
      const symbolHeight = 96;
      const spins = 30 + Math.floor(Math.random()*20) + idx*6;
      const finalIndex = Math.floor(Math.random()*30);
      const translateY = -(spins*symbolHeight + finalIndex*symbolHeight);
      strip.style.transition = 'transform 0.9s cubic-bezier(.2,.9,.2,1)';
      strip.style.transform = `translateY(${translateY}px)`;
      setTimeout(()=>{
        strip.style.transition = 'transform 0.28s cubic-bezier(.2,.9,.2,1)';
        strip.style.transform = `translateY(${translateY + 18}px)`;
        setTimeout(()=>{ strip.style.transform = `translateY(${translateY}px)`; }, 120);
        playAudio('reel_stop');
        if(idx === reelEls.length-1){
          setTimeout(()=>{ spinning=false; evaluateSpin(collectVisibleSymbols()); }, 260);
        }
      }, 300 + idx*260);
    });
  }

  function collectVisibleSymbols(){
    const reelEls = $all('.reel');
    const matrix = [];
    reelEls.forEach(r=>{
      const strip = r.querySelector('.strip');
      const children = Array.from(strip.children);
      const style = window.getComputedStyle(strip);
      const transform = style.transform;
      let ty = 0;
      if(transform && transform !== 'none'){
        const m = transform.match(/matrix\\(([^)]+)\\)/);
        if(m){ const vals = m[1].split(','); ty = parseFloat(vals[5]); }
      }
      const symbolHeight = 96;
      const offset = Math.abs(Math.round(ty / symbolHeight));
      const col = [];
      for(let rIdx=0;rIdx<ROWS;rIdx++){
        const idx = (offset + rIdx) % children.length;
        col.push(children[idx].dataset.sym || children[idx].textContent);
      }
      matrix.push(col);
    });
    return matrix;
  }

  function evaluateSpin(matrix){
    const mid = Math.floor(ROWS/2);
    const midSymbols = matrix.map(col => col[mid]);
    function eq(a,b){ if(a==='WILD' || b==='WILD') return true; return a===b; }
    let runSym = midSymbols[0], runLen=1;
    for(let i=1;i<midSymbols.length;i++){ if(eq(midSymbols[i], runSym)) runLen++; else break; }
    const pay = {'7':200,'BAR':50,'A':20,'K':15,'Q':12,'J':10,'CH':8,'WILD':100,'BONUS':0};
    let win = 0;
    if(runLen>=3){ const base = pay[runSym] || 0; win = base * Number($('#betSel').value) * runLen; }
    const bonusCount = matrix.flat().filter(s=>s==='BONUS').length;
    if(bonusCount>=3){
      const free = 5;
      sessionStorage.setItem('cs_free', (Number(sessionStorage.getItem('cs_free')||0)+free));
      log(`BONUS! ${free} free spins awarded.`);
      playAudio('big_win');
      spawnParticles(window.innerWidth/2, 200, '#ffb86b', 80);
    }
    if(Math.random() < 0.001){
      const j = getJack();
      setBalance(cur, getBalance(cur)+j);
      setJack(1000);
      log(`JACKPOT! You won ${formatMoney(j)}!`);
      playAudio('mega_win');
      spawnParticles(window.innerWidth/2, 200, '#ffd700', 160);
      return;
    } else {
      setJack(getJack() + Number($('#betSel').value)*Number($('#linesRange').value)*0.02);
    }
    if(win>0){
      setBalance(cur, getBalance(cur)+win);
      lastWin = win;
      $('#lastWin').textContent = formatMoney(lastWin);
      $('#gBalance').textContent = formatMoney(getBalance(cur));
      log(`Win ${formatMoney(win)} (symbol ${runSym} x${runLen})`);
      playAudio('win');
      spawnParticles(window.innerWidth/2, 200, '#ffd700', 60);
      highlightWinningLine();
    } else {
      lastWin = 0;
      $('#lastWin').textContent = formatMoney(0);
      log('No win this spin.');
      playAudio('lose');
    }
    $('#gBalance').textContent = formatMoney(getBalance(cur));
    $('#jackPanel').textContent = formatMoney(getJack());
  }

  function highlightWinningLine(){
    const reelEls = $all('.reel');
    reelEls.forEach(r=>{
      const strip = r.querySelector('.strip');
      const children = Array.from(strip.children);
      children.forEach(c=> c.classList.remove('highlight'));
      const center = 2;
      const target = children[center];
      if(target){ target.classList.add('highlight'); setTimeout(()=> target.classList.remove('highlight'), 1400); }
    });
  }

  function log(msg){ const el = $('#gameLog'); el.innerHTML = `<div style="margin-bottom:6px"><span class="muted">${new Date().toLocaleTimeString()}</span> ${msg}</div>` + el.innerHTML; }

  $('#spinBtn').onclick = ()=> { spin(); };
  $('#autoBtn').onclick = ()=> {
    autoCount = 10;
    const run = ()=>{ if(autoCount<=0) return; spin(); autoCount--; setTimeout(run, 900); };
    run();
  };

  $('#redBtn').onclick = ()=> doGamble('red');
  $('#blackBtn').onclick = ()=> doGamble('black');
  function doGamble(choice){
    if(lastWin<=0){ log('No win to gamble'); return; }
    const color = Math.random() < 0.5 ? 'red' : 'black';
    if(choice===color){
      setBalance(cur, getBalance(cur)+lastWin);
      lastWin = lastWin*2;
      $('#lastWin').textContent = formatMoney(lastWin);
      $('#gBalance').textContent = formatMoney(getBalance(cur));
      log(`Gamble win! Color ${color}. Win doubled to ${formatMoney(lastWin)}.`);
      playAudio('big_win');
      spawnParticles(window.innerWidth/2, 200, '#2ecc71', 80);
    } else {
      setBalance(cur, Math.max(0, getBalance(cur)-lastWin));
      log(`Gamble lost. Color was ${color}. Lost ${formatMoney(lastWin)}.`);
      lastWin = 0;
      $('#lastWin').textContent = formatMoney(0);
      $('#gBalance').textContent = formatMoney(getBalance(cur));
      playAudio('lose');
    }
  }

  $('#gBalance').textContent = formatMoney(getBalance(cur));
  $('#jackPanel').textContent = formatMoney(getJack());
  $('#lastWin').textContent = formatMoney(0);
}

/* Symbol pool builder */
function buildSymbolPool(){
  return [
    {id:'7', label:'7', weight:6},
    {id:'BAR', label:'BAR', weight:5},
    {id:'A', label:'A', weight:8},
    {id:'K', label:'K', weight:9},
    {id:'Q', label:'Q', weight:10},
    {id:'J', label:'J', weight:11},
    {id:'CH', label:'🍒', weight:12},
    {id:'WILD', label:'WILD', weight:3, special:'wild'},
    {id:'BONUS', label:'BONUS', weight:4, special:'bonus'}
  ];
}

/* Small helpers */
function $(s,root=document){ return root.querySelector(s); }
function $all(s,root=document){ return Array.from(root.querySelectorAll(s)); }

/* Init: preload repo images and audio, then render */
(async function init(){
  await preloadRepoImages();
  await preloadAudio();
  applySymbolImagesToEngine();
  render();
  renderBalance();
  renderJack();
})();

/* Expose debug */
window._cs = { getUsers, getBalance, setBalance, getJack, setJack, loadSymbolImages };

/* Console hint */
console.log('Loaded Chaos Slot Deluxe. Place images in assets/images/ and audio in assets/audio/ or use Upload Symbols to add images in-browser.');
</script>
</body>
</html>
